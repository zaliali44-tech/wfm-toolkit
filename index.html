<script>

let occChart
let forecastChart

function runAnalysis(){

let calls=document.getElementById("calls").value.split(",").map(Number)
let aht=document.getElementById("aht").value.split(",").map(Number)
let agents=document.getElementById("agents").value.split(",").map(Number)
let actual=document.getElementById("actual").value.split(",").map(Number)

let tbody=document.querySelector("#results tbody")
tbody.innerHTML=""

let occData=[]
let forecastData=[]
let actualData=[]

for(let i=0;i<calls.length;i++){

let workload=(calls[i]*aht[i])/3600
let reqFTE=workload/0.85

let occ=(workload/agents[i])*100
let util=occ*0.9

let variance=(actual[i]||0)-calls[i]
let accuracy=actual[i]?100-(Math.abs(variance)/calls[i]*100):0

let cpa=calls[i]/agents[i]

occData.push(Number(occ.toFixed(1)))
forecastData.push(calls[i])
actualData.push(actual[i]||0)

let row=`<tr>

<td>${i+1}</td>
<td>${calls[i]}</td>
<td>${actual[i]||"-"}</td>
<td>${aht[i]}</td>
<td>${agents[i]}</td>
<td>${workload.toFixed(2)}</td>
<td>${reqFTE.toFixed(2)}</td>
<td>${occ.toFixed(1)}%</td>
<td>${util.toFixed(1)}%</td>
<td>${accuracy?accuracy.toFixed(1)+"%":"-"}</td>
<td>${variance}</td>
<td>${cpa.toFixed(1)}</td>

</tr>`

tbody.innerHTML+=row

}

drawCharts(occData,forecastData,actualData)
generateInsights(occData)

}



function drawCharts(occ,forecast,actual){

if(occChart) occChart.destroy()
if(forecastChart) forecastChart.destroy()

occChart=new Chart(document.getElementById("occChart"),{

type:"line",

data:{
labels:occ.map((_,i)=>"Interval "+(i+1)),
datasets:[{
label:"Occupancy %",
data:occ,
borderWidth:2,
tension:0.3
}]
},

options:{
responsive:true,
plugins:{legend:{position:"top"}},
scales:{
y:{beginAtZero:true,max:120,title:{display:true,text:"Occupancy %"}},
x:{title:{display:true,text:"Intervals"}}
}
}

})


forecastChart=new Chart(document.getElementById("forecastChart"),{

type:"bar",

data:{
labels:forecast.map((_,i)=>"Interval "+(i+1)),
datasets:[
{label:"Forecast",data:forecast},
{label:"Actual",data:actual}
]
},

options:{
responsive:true,
plugins:{legend:{position:"top"}},
scales:{
y:{beginAtZero:true,title:{display:true,text:"Call Volume"}},
x:{title:{display:true,text:"Intervals"}}
}
}

})

}



function generateInsights(occ){

let avg=occ.reduce((a,b)=>a+b)/occ.length

let insight=""

if(avg>95){

insight="RCA: Severe understaffing detected.<br>"
insight+="Action: Increase staffing or reduce shrinkage."

}

else if(avg>85){

insight="RCA: High occupancy pressure.<br>"
insight+="Action: Consider adding buffer agents."

}

else if(avg<60){

insight="RCA: Overstaffing trend detected.<br>"
insight+="Action: Optimize schedules or reduce staffing."

}

else{

insight="Operations balanced. No major staffing risks."

}

let box=document.getElementById("insightBox")

if(!box){

let div=document.createElement("div")
div.id="insightBox"
div.style.marginTop="20px"
div.style.padding="10px"
div.style.background="#eef6ff"
div.style.borderRadius="6px"

document.querySelector(".section:nth-child(2)").appendChild(div)

box=div

}

box.innerHTML="<b>Operational Insight</b><br>"+insight

}



function calcShrinkage(){

let sch=document.getElementById("sch").value
let pl=document.getElementById("pl").value
let upl=document.getElementById("upl").value
let woff=document.getElementById("woff").value

let shrink=((Number(pl)+Number(upl)+Number(woff))/sch)*100

document.getElementById("shrinkResult").innerText="Shrinkage: "+shrink.toFixed(2)+"%"

}



function capacityCalc(){

let calls=document.getElementById("ccalls").value
let aht=document.getElementById("caht").value
let shrink=document.getElementById("cshrink").value/100

let workload=(calls*aht)/3600
let fte=workload/0.85
let finalFTE=fte/(1-shrink)

document.getElementById("capacityResult").innerText="Required FTE: "+finalFTE.toFixed(2)

}



function erlang(){

let calls=document.getElementById("ecalls").value
let aht=document.getElementById("eaht").value

let load=(calls*aht)/3600

let agents=Math.ceil(load/0.85)

document.getElementById("erlangResult").innerText="Agents Required: "+agents

}



function predictSL(){

let calls=document.getElementById("slcalls").value
let aht=document.getElementById("slaht").value
let agents=document.getElementById("slagents").value

let load=(calls*aht)/3600
let occ=load/agents

let sl=Math.max(0,100-(occ*100))

document.getElementById("slResult").innerText="Estimated SL: "+sl.toFixed(1)+"%"

}



function reforecast(){

let f=document.getElementById("rf").value
let a=document.getElementById("ra").value
let r=document.getElementById("rr").value

let variance=a/f
let newF=r*variance

document.getElementById("rfResult").innerText="Updated Remaining Forecast: "+Math.round(newF)

}



const dropZone=document.getElementById("dropZone")

dropZone.addEventListener("dragover",e=>{
e.preventDefault()
dropZone.style.background="#dbe9ff"
})

dropZone.addEventListener("dragleave",()=>{
dropZone.style.background="#f0f6ff"
})

dropZone.addEventListener("drop",e=>{

e.preventDefault()

let file=e.dataTransfer.files[0]

Papa.parse(file,{

header:true,

complete:function(results){

let data=results.data

let calls=[]
let actual=[]
let aht=[]
let agents=[]

data.forEach(row=>{

if(row.Forecast){

calls.push(Number(row.Forecast))
actual.push(Number(row.Actual))
aht.push(Number(row.AHT))
agents.push(Number(row.Agents))

}

})

document.getElementById("calls").value=calls.join(",")
document.getElementById("actual").value=actual.join(",")
document.getElementById("aht").value=aht.join(",")
document.getElementById("agents").value=agents.join(",")

alert("File uploaded successfully. Click Run Analysis.")

}

})

})

</script>
